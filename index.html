<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="dashboard">

    <!-- Greeting Widget -->
    <section id="greeting" class="widget">
      <div id="greeting-time" class="greeting-time"></div>
      <div id="greeting-date" class="greeting-date"></div>
      <div id="greeting-text" class="greeting-text"></div>
    </section>

    <!-- Focus Timer Widget -->
    <section id="timer" class="widget">
      <h2 class="widget-title">Focus Timer</h2>
      <div id="timer-display" class="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="timer-start" type="button">Start</button>
        <button id="timer-stop" type="button" disabled>Stop</button>
        <button id="timer-reset" type="button">Reset</button>
      </div>
    </section>

    <!-- To-Do List Widget -->
    <section id="todo" class="widget">
      <h2 class="widget-title">To-Do</h2>
      <div class="todo-input-row">
        <input id="todo-input" type="text" placeholder="Add a task…" aria-label="New task title" />
        <button id="todo-add" type="button">Add</button>
      </div>
      <p id="todo-validation" class="validation-message" aria-live="polite"></p>
      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section id="links" class="widget">
      <h2 class="widget-title">Quick Links</h2>
      <div class="links-input-row">
        <input id="links-label-input" type="text" placeholder="Label" aria-label="Link label" />
        <input id="links-url-input" type="url" placeholder="https://…" aria-label="Link URL" />
        <button id="links-add" type="button">Add</button>
      </div>
      <p id="links-validation" class="validation-message" aria-live="polite"></p>
      <div id="links-container" class="links-container"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
